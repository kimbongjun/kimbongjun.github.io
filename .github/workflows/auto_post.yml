name: Auto Blog Post
on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch: # 수동 실행 버튼 생성

permissions: # 👈 이 섹션을 추가해야 push 에러가 안 납니다
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: pip install -U google-generativeai
        
      - name: Run script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        # 👈 본인의 파일 경로와 이름으로 정확히 수정하세요!
        run: python scripts/post_generator.py 
        
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # 새로운 파일이 있을 때만 커밋 (없으면 에러 방지)
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-generated blog post" && git push)